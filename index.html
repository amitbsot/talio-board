<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talio-board - משחק משפחתי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7;
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        #lobby {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(253, 251, 247, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .room-input {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            font-size: 20px;
            margin-bottom: 25px;
            border: 2px solid #dcd5c6;
            border-radius: 12px;
            text-align: center;
            background-color: #fff;
            color: #333;
        }

        .team-btn {
            width: 80%;
            max-width: 300px;
            padding: 20px;
            font-size: 22px;
            margin: 10px;
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .team-btn.blue { background-color: #D6EAF8; color: #2874A6; border-color: #AED6F1; box-shadow: 0 4px 0 #AED6F1; }
        .team-btn.red { background-color: #FADBD8; color: #943126; border-color: #F5B7B1; box-shadow: 0 4px 0 #F5B7B1; }
        .team-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        #shared-board {
            background-color: #f4f1ea;
            padding: 15px 10px;
            text-align: center;
            border-bottom: 3px solid #e0dcd3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .game-title {
            font-size: 26px;
            font-weight: 900;
            color: #f39c12;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .board-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin: 10px auto;
            max-width: 600px;
            padding: 10px;
            background-color: #ffffff;
            border-radius: 12px;
            border: 2px solid #e0dcd3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .square {
            width: 35px;
            height: 35px;
            background-color: #faf9f5;
            border: 1px solid #ece8e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
            transition: background 0.4s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .square.finish {
            border: 2px solid #f39c12;
            color: #f39c12;
            background-color: #fef9e7;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        #timer {
            font-size: 40px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 5px;
        }

        #btn-reset {
            background-color: #fff;
            color: #555;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        #personal-area {
            padding: 20px 10px 40px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .card {
            background-color: white;
            color: #333;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            margin-top: 10px;
            border: 1px solid #f0f0f0;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(15px) !important;
        }

        /* עיצוב לאזור המדיה (אימוג'י/תמונה) */
        #card-media {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
            margin: 5px 0 15px 0;
            font-size: 65px;
        }

        #card-media img {
            max-width: 80px;
            max-height: 80px;
            object-fit: contain;
        }

        .main-word {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px dashed #eee;
            padding-bottom: 10px;
        }

        .taboo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
        }

        .taboo-list li { margin: 8px 0; }

        .controls {
            display: flex;
            width: 95%;
            max-width: 400px;
            gap: 15px;
        }

        button.action-btn {
            flex: 1;
            padding: 18px 10px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #333;
            transition: transform 0.1s;
        }

        button.action-btn:active { transform: scale(0.95); }
        .btn-correct { background-color: #A9DFBF; box-shadow: 0 4px 0 #7DCEA0;} 
        .btn-skip { background-color: #F5B7B1; box-shadow: 0 4px 0 #F1948A;} 
        .btn-start { background-color: #F9E79F; color: #7D6608; width: 90%; max-width: 350px; margin-top: 20px; box-shadow: 0 4px 0 #F4D03F; border:none; padding: 18px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer;} 

        .hidden { display: none !important; }

        .message-box {
            background-color: #e8f8f5;
            color: #117a65;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
            border: 1px solid #d1f2eb;
        }

        @media (max-width: 400px) {
            .square { width: 28px; height: 28px; font-size: 10px; border-radius: 6px; }
            .game-title { font-size: 22px; }
            .main-word { font-size: 28px; }
            .taboo-list { font-size: 18px; }
            button.action-btn { font-size: 18px; padding: 15px 5px; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 class="game-title" style="font-size: 42px; margin-bottom: 10px; text-align: center;">TALIO-BOARD</h1>
        <h3 style="margin-bottom: 20px; color: #777;">הכנס שם חדר ובחר קבוצה:</h3>
        
        <input type="text" id="room-input" class="room-input" placeholder="שם החדר (למשל: משפחת כהן)">
        
        <button class="team-btn blue" onclick="joinTeam('blue')">קבוצה תכלת</button>
        <button class="team-btn red" onclick="joinTeam('red')">קבוצה ורודה</button>
    </div>

    <div id="shared-board">
        <div class="top-info">
            <button id="btn-reset" onclick="resetGame()">משחק חדש</button>
            <div class="game-title">TALIO</div>
            <div style="font-size: 14px; color: #888; font-weight: bold;" id="room-display"></div>
        </div>
        
        <div class="board-grid" id="board-grid"></div>

        <div id="timer">01:00</div>
        <div id="status" style="margin-top:5px; color:#888; font-weight:bold;">ממתין לשחקנים...</div>
    </div>

    <div id="personal-area">
        <button id="btn-start" class="btn-start hidden">התחל תור לקבוצה שלי</button>

        <div id="role-message" class="message-box hidden"></div>

        <div id="card-container" class="card hidden">
            <div style="font-size: 12px; color: #aaa; margin-bottom: 5px;" id="card-role-title"></div>
            
            <div id="card-media"></div>
            
            <div class="main-word" id="main-word">מילה</div>
            <ul class="taboo-list" id="taboo-words"></ul>
        </div>

        <div id="controls" class="controls hidden">
            <button id="btn-skip" class="action-btn btn-skip">פס / דילוג</button>
            <button id="btn-correct" class="action-btn btn-correct">הצליחו!</button>
        </div>
    </div>

        const uiLobby = document.getElementById('lobby');
        const uiTimer = document.getElementById('timer');
        const uiStatus = document.getElementById('status');
        const uiCardContainer = document.getElementById('card-container');
        const uiBtnStart = document.getElementById('btn-start');
        const uiRoleMessage = document.getElementById('role-message');
        const uiCardRoleTitle = document.getElementById('card-role-title');

        window.joinTeam = function(team) {
            const inputVal = document.getElementById('room-input').value.trim();
            if(!inputVal) {
                alert("אנא הכנס שם חדר!");
                return;
            }
            
            roomId = inputVal;
            myTeam = team;
            roomRef = ref(db, 'rooms/' + roomId);

            uiLobby.style.display = 'none';
            document.getElementById('room-display').textContent = `חדר: ${roomId} | ${team === 'blue' ? 'תכלת' : 'ורוד'}`;
            
            get(roomRef).then(snapshot => {
                if (!snapshot.exists()) {
                    let fullDeck = Array.from({length: cards.length}, (_, i) => i);
                    fullDeck = fullDeck.sort(() => Math.random() - 0.5);

                    set(roomRef, {
                        scoreBlue: 0,
                        scoreRed: 0,
                        deck: fullDeck,
                        currentCardIndex: fullDeck[0],
                        isPlaying: false,
                        activeTeam: null,
                        describerId: null,
                        timeLeft: 60
                    });
                }
                listenToRoom(); 
            });
        };

        window.resetGame = async function() {
            if(!roomRef) return;
            if(confirm("להתחיל משחק חדש ולאפס את הלוח?")) {
                let fullDeck = Array.from({length: cards.length}, (_, i) => i);
                fullDeck = fullDeck.sort(() => Math.random() - 0.5);

                await set(roomRef, {
                    scoreBlue: 0,
                    scoreRed: 0,
                    deck: fullDeck,
                    currentCardIndex: fullDeck[0],
                    isPlaying: false,
                    activeTeam: null,
                    describerId: null,
                    timeLeft: 60
                });
                lastDisplayedCardIndex = -1; 
            }
        };

        function updateBoardColors(scoreBlue, scoreRed) {
            let bluePos = Math.min(scoreBlue, MAX_STEPS);
            let redPos = Math.min(scoreRed, MAX_STEPS);

            for(let i=0; i<=MAX_STEPS; i++) {
                let sq = document.getElementById('sq-' + i);
                if(sq) sq.style.background = ''; 
            }

            const sqBlue = document.getElementById('sq-' + bluePos);
            const sqRed = document.getElementById('sq-' + redPos);

            if(bluePos === redPos && bluePos > 0) {
                if(sqBlue) sqBlue.style.background = 'linear-gradient(to right, #D6EAF8 50%, #FADBD8 50%)';
            } else {
                if(sqBlue) sqBlue.style.background = '#D6EAF8';
                if(sqRed) sqRed.style.background = '#FADBD8';
            }
        }

        function listenToRoom() {
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                updateBoardColors(data.scoreBlue, data.scoreRed);

                let seconds = data.timeLeft % 60;
                uiTimer.textContent = `00:${seconds < 10 ? '0'+seconds : seconds}`;
                localIsPlaying = data.isPlaying;

                if (data.isPlaying) {
                    uiBtnStart.classList.add('hidden');
                    uiStatus.textContent = `תור הקבוצה ה${data.activeTeam === 'blue' ? 'תכלת' : 'ורודה'}!`;
                    uiStatus.style.color = data.activeTeam === 'blue' ? '#2874A6' : '#943126';
                    
                    if (myTeam !== data.activeTeam) {
                        uiRoleMessage.classList.add('hidden');
                        uiCardContainer.classList.remove('hidden');
                        document.getElementById('controls').classList.add('hidden');
                        uiCardRoleTitle.textContent = "👁️ מצב פיקוח: ודאו שהם לא אומרים את המילים!";
                        
                        if (data.currentCardIndex !== lastDisplayedCardIndex) {
                            loadCardWithFade(data.currentCardIndex);
                            lastDisplayedCardIndex = data.currentCardIndex;
                        }

                    } else {
                        if (myPlayerId === data.describerId) {
                            uiRoleMessage.classList.add('hidden');
                            uiCardContainer.classList.remove('hidden');
                            document.getElementById('controls').classList.remove('hidden');
                            uiCardRoleTitle.textContent = "🗣️ אתה המתאר! תן רמזים לקבוצה שלך";

                            if (data.currentCardIndex !== lastDisplayedCardIndex) {
                                loadCardWithFade(data.currentCardIndex);
                                lastDisplayedCardIndex = data.currentCardIndex;
                            }
                        } else {
                            uiCardContainer.classList.add('hidden');
                            document.getElementById('controls').classList.add('hidden');
                            uiRoleMessage.classList.remove('hidden');
                            uiRoleMessage.textContent = "🧠 התור שלכם! חבר קבוצה מתאר את המילה, נחשו מהי!";
                            uiRoleMessage.style.backgroundColor = "#e8f8f5";
                            uiRoleMessage.style.color = "#117a65";
                        }
                    }

                } else {
                    uiCardContainer.classList.add('hidden');
                    document.getElementById('controls').classList.add('hidden');
                    uiRoleMessage.classList.add('hidden');
                    lastDisplayedCardIndex = -1; 
                    
                    if(data.scoreBlue >= MAX_STEPS) {
                        uiStatus.textContent = "🏆 קבוצת התכלת ניצחה! 🏆";
                        uiStatus.style.color = "#2874A6";
                        uiBtnStart.classList.add('hidden');
                    } else if(data.scoreRed >= MAX_STEPS) {
                        uiStatus.textContent = "🏆 הקבוצה הורודה ניצחה! 🏆";
                        uiStatus.style.color = "#943126";
                        uiBtnStart.classList.add('hidden');
                    } else {
                        if (myTeam) uiBtnStart.classList.remove('hidden');
                        uiStatus.textContent = "ממתינים לתחילת התור";
                        uiStatus.style.color = "#888";
                    }
                    clearInterval(timerInterval);
                }
            });
        }

        uiBtnStart.addEventListener('click', async () => {
            if (!myTeam || !roomRef) return;
            const snapshot = await get(roomRef);
            const data = snapshot.val();
            
            if(data.scoreBlue >= MAX_STEPS || data.scoreRed >= MAX_STEPS) return;

            update(roomRef, {
                isPlaying: true,
                activeTeam: myTeam,
                describerId: myPlayerId, 
                timeLeft: 60
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(async () => {
                const snap = await get(roomRef);
                const currentData = snap.val();
                if (currentData && currentData.timeLeft > 0) {
                    update(roomRef, { timeLeft: currentData.timeLeft - 1 });
                } else {
                    update(roomRef, { isPlaying: false });
                    clearInterval(timerInterval);
                }
            }, 1000);
        });

        async function drawNextCard(isCorrect) {
            if (!localIsPlaying || !roomRef) return;
            const snapshot = await get(roomRef);
            const data = snapshot.val();
            
            if (data.describerId !== myPlayerId) return;

            let deck = data.deck || [];
            deck.shift(); 
            
            if (deck.length === 0) {
                deck = Array.from({length: cards.length}, (_, i) => i);
                deck = deck.sort(() => Math.random() - 0.5);
            }

            let updates = {
                deck: deck,
                currentCardIndex: deck[0]
            };

            if (isCorrect) {
                if (data.activeTeam === 'blue') updates.scoreBlue = data.scoreBlue + 1;
                if (data.activeTeam === 'red') updates.scoreRed = data.scoreRed + 1;
            }

            update(roomRef, updates);
        }

        document.getElementById('btn-correct').addEventListener('click', () => drawNextCard(true));
        document.getElementById('btn-skip').addEventListener('click', () => drawNextCard(false));

        let fadeTimeout;
        function loadCardWithFade(index) {
            const card = cards[index];
            if (!card) return;

            uiCardContainer.classList.add('fade-out');

            clearTimeout(fadeTimeout);
            fadeTimeout = setTimeout(() => {
                
                // טיפול בתמונה או באימוג'י
                const mediaContainer = document.getElementById('card-media');
                if (card.icon) {
                    mediaContainer.innerHTML = `<div>${card.icon}</div>`;
                } else if (card.image) {
                    // יטען תמונה מהתיקייה העתידית שתוסיף (images/...)
                    mediaContainer.innerHTML = `<img src="images/${card.image}" alt="${card.word}" onerror="this.src='https://via.placeholder.com/80?text=תמונה'">`;
                } else {
                    // למקרה שאין לא את זה ולא את זה
                    mediaContainer.innerHTML = `<img src="https://via.placeholder.com/80?text=תמונה" alt="תמונה חסרה">`;
                }

                document.getElementById('main-word').textContent = card.word;
                const uiTabooWords = document.getElementById('taboo-words');
                uiTabooWords.innerHTML = '';
                card.taboo.forEach(word => {
                    const li = document.createElement('li');
                    li.textContent = word;
                    uiTabooWords.appendChild(li);
                });

                uiCardContainer.classList.remove('fade-out');
            }, 300);
        }
