<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talio-board - משחק לוח</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* --- מסך לובי --- */
        #lobby {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(26, 26, 46, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .team-btn {
            width: 80%;
            max-width: 300px;
            padding: 20px;
            font-size: 22px;
            margin: 10px;
            border-radius: 15px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .team-btn.blue { background-color: #0f3460; color: #4facfe; border-color: #4facfe; }
        .team-btn.red { background-color: #4a0e1c; color: #ff0844; border-color: #ff0844; }

        /* --- הלוח המשותף --- */
        #shared-board {
            background-color: #16213e;
            padding: 15px 10px;
            text-align: center;
            border-bottom: 4px solid #0f3460;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .game-title {
            font-size: 26px;
            font-weight: 900;
            color: #ffb703;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* --- עיצוב משטח המשבצות --- */
        .board-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin: 10px auto;
            max-width: 600px;
            padding: 10px;
            background-color: #1a1a2e;
            border-radius: 10px;
            border: 2px solid #333;
        }

        .square {
            width: 35px;
            height: 35px;
            background-color: #2a2a4a;
            border: 1px solid #111;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ccc;
            transition: background 0.4s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .square.finish {
            border: 2px solid #ffb703;
            color: #ffb703;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        #timer {
            font-size: 40px;
            font-weight: bold;
            color: #e94560;
            margin-top: 5px;
        }

        #btn-reset {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* --- האזור האישי ואנימציות Fade --- */
        #personal-area {
            padding: 20px 10px 40px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .card {
            background-color: white;
            color: black;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            margin-top: 10px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(15px) !important;
        }

        .main-word {
            font-size: 32px;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 10px;
            border-bottom: 3px solid #eee;
            padding-bottom: 5px;
        }

        .taboo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            color: #d90429;
            font-weight: bold;
        }

        .taboo-list li { margin: 6px 0; }

        .controls {
            display: flex;
            width: 95%;
            max-width: 400px;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 18px 10px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        .btn-correct { background-color: #28a745; box-shadow: 0 4px 0 #1e7e34;}
        .btn-skip { background-color: #dc3545; box-shadow: 0 4px 0 #bd2130;}
        .btn-start { background-color: #ffb703; color: black; width: 90%; max-width: 350px; margin-top: 20px; box-shadow: 0 4px 0 #d49800;}

        .hidden { display: none !important; }

        /* --- התאמה רספונסיבית --- */
        @media (max-width: 400px) {
            .square { width: 28px; height: 28px; font-size: 10px; }
            .game-title { font-size: 22px; }
            .main-word { font-size: 28px; }
            .taboo-list { font-size: 18px; }
            button { font-size: 18px; padding: 15px 5px; }
        }
    </style>
</head>

                let fullDeck = Array.from({length: cards.length}, (_, i) => i);
                fullDeck = fullDeck.sort(() => Math.random() - 0.5);

                await set(roomRef, {
                    scoreBlue: 0,
                    scoreRed: 0,
                    deck: fullDeck,
                    currentCardIndex: fullDeck[0],
                    isPlaying: false,
                    activeTeam: null,
                    timeLeft: 60
                });
                lastDisplayedCardIndex = -1; // איפוס הזיכרון
            }
        };

            document.getElementById('room-display').textContent = `קבוצה: ${team === 'blue' ? 'כחולה' : 'אדומה'}`;

                    let fullDeck = Array.from({length: cards.length}, (_, i) => i);
                    fullDeck = fullDeck.sort(() => Math.random() - 0.5);

                    set(roomRef, {
                        scoreBlue: 0,
                        scoreRed: 0,
                        deck: fullDeck,
                        currentCardIndex: fullDeck[0],

                        activeTeam: null,
                        timeLeft: 60

            });

            }

            const sqBlue = document.getElementById('sq-' + bluePos);
            const sqRed = document.getElementById('sq-' + redPos);

            if(bluePos === redPos) {
                if(sqBlue) sqBlue.style.background = 'linear-gradient(to right, #4facfe 50%, #ff0844 50%)';
            } else {
                if(sqBlue) sqBlue.style.background = '#4facfe';
                if(sqRed) sqRed.style.background = '#ff0844';
            }
        }

        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            updateBoardColors(data.scoreBlue, data.scoreRed);

            let seconds = data.timeLeft % 60;
            uiTimer.textContent = `00:${seconds < 10 ? '0'+seconds : seconds}`;
            localIsPlaying = data.isPlaying;

            if (data.isPlaying) {
                uiBtnStart.classList.add('hidden');
                uiStatus.textContent = `תור הקבוצה ה${data.activeTeam === 'blue' ? 'כחולה' : 'אדומה'}!`;
                uiStatus.style.color = data.activeTeam === 'blue' ? '#4facfe' : '#ff0844';
                
                if (myTeam === data.activeTeam) {
                    uiCardContainer.classList.remove('hidden');
                    document.getElementById('controls').classList.remove('hidden');
                    
                    // התיקון הקריטי: מעדכן רק אם הקלף באמת התחלף בשרת
                    if (data.currentCardIndex !== lastDisplayedCardIndex) {
                        loadCardWithFade(data.currentCardIndex);
                        lastDisplayedCardIndex = data.currentCardIndex;
                    }

                } else {
                    uiCardContainer.classList.add('hidden');
                    document.getElementById('controls').classList.add('hidden');
                }
            } else {
                uiCardContainer.classList.add('hidden');
                document.getElementById('controls').classList.add('hidden');
                lastDisplayedCardIndex = -1; // מאפס בסוף התור
                
                if(data.scoreBlue >= MAX_STEPS) {
                    uiStatus.textContent = "🏆 הקבוצה הכחולה ניצחה! 🏆";
                    uiStatus.style.color = "#4facfe";
                    uiBtnStart.classList.add('hidden');
                } else if(data.scoreRed >= MAX_STEPS) {
                    uiStatus.textContent = "🏆 הקבוצה האדומה ניצחה! 🏆";
                    uiStatus.style.color = "#ff0844";
                    uiBtnStart.classList.add('hidden');
                } else {
                    if (myTeam) uiBtnStart.classList.remove('hidden');
                    uiStatus.textContent = "ממתינים לתחילת התור";
                    uiStatus.style.color = "#aaa";
                }
                clearInterval(timerInterval);
            }
        });

        uiBtnStart.addEventListener('click', async () => {
            if (!myTeam) return;
            const snapshot = await get(roomRef);
            const data = snapshot.val();
            
            if(data.scoreBlue >= MAX_STEPS || data.scoreRed >= MAX_STEPS) return;

            update(roomRef, {
                isPlaying: true,
                activeTeam: myTeam,
                timeLeft: 60
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(async () => {
                const snap = await get(roomRef);
                const currentData = snap.val();
                if (currentData && currentData.timeLeft > 0) {
                    update(roomRef, { timeLeft: currentData.timeLeft - 1 });
                } else {
                    update(roomRef, { isPlaying: false });
                    clearInterval(timerInterval);
                }
            }, 1000);
        });

        async function drawNextCard(isCorrect) {
            if (!localIsPlaying) return;
            const snapshot = await get(roomRef);
            const data = snapshot.val();
            
            let deck = data.deck || [];
            deck.shift(); 
            
            if (deck.length === 0) {
                deck = Array.from({length: cards.length}, (_, i) => i);
                deck = deck.sort(() => Math.random() - 0.5);
            }

            let updates = {
                deck: deck,
                currentCardIndex: deck[0]
            };

            if (isCorrect) {
                if (data.activeTeam === 'blue') updates.scoreBlue = data.scoreBlue + 1;
                if (data.activeTeam === 'red') updates.scoreRed = data.scoreRed + 1;
            }

            update(roomRef, updates);
        }

        document.getElementById('btn-correct').addEventListener('click', () => drawNextCard(true));
        document.getElementById('btn-skip').addEventListener('click', () => drawNextCard(false));

        let fadeTimeout;
        function loadCardWithFade(index) {
            const card = cards[index];
            if (!card) return;

            uiCardContainer.classList.add('fade-out');

            clearTimeout(fadeTimeout);
            fadeTimeout = setTimeout(() => {
                document.getElementById('main-word').textContent = card.word;
                const uiTabooWords = document.getElementById('taboo-words');
                uiTabooWords.innerHTML = '';
                card.taboo.forEach(word => {
                    const li = document.createElement('li');
                    li.textContent = word;
                    uiTabooWords.appendChild(li);
                });

                uiCardContainer.classList.remove('fade-out');
            }, 300);
        }
    </script>
</body>
</html>
