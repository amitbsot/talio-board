<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talio-board - משחק משפחתי</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7; 
            color: #4a4a4a; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* --- מסך לובי --- */
        #lobby {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(253, 251, 247, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .room-input {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            font-size: 20px;
            margin-bottom: 25px;
            border: 2px solid #dcd5c6;
            border-radius: 12px;
            text-align: center;
            background-color: #fff;
            color: #333;
        }

        #team-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .team-btn {
            width: 80%;
            max-width: 300px;
            padding: 20px;
            font-size: 22px;
            margin: 8px;
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .team-btn.blue { background-color: #D6EAF8; color: #2874A6; border-color: #AED6F1; box-shadow: 0 4px 0 #AED6F1; }
        .team-btn.red { background-color: #FADBD8; color: #943126; border-color: #F5B7B1; box-shadow: 0 4px 0 #F5B7B1; }
        .team-btn.purple { background-color: #E8DAEF; color: #6C3483; border-color: #D2B4DE; box-shadow: 0 4px 0 #D2B4DE; }
        .team-btn.green { background-color: #D5F5E3; color: #1E8449; border-color: #ABEBC6; box-shadow: 0 4px 0 #ABEBC6; }
        .team-btn.yellow { background-color: #FCF3CF; color: #B7950B; border-color: #F9E79F; box-shadow: 0 4px 0 #F9E79F; }
        
        .team-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        #btn-add-team {
            background: none;
            border: 2px dashed #bbb;
            color: #777;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.2s;
        }
        #btn-add-team:hover { background-color: #f0f0f0; }

        /* --- הלוח המשותף --- */
        #shared-board {
            background-color: #f4f1ea;
            padding: 15px 10px;
            text-align: center;
            border-bottom: 3px solid #e0dcd3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .game-title {
            font-size: 26px;
            font-weight: 900;
            color: #f39c12;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .board-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin: 10px auto;
            max-width: 600px;
            padding: 10px;
            background-color: #ffffff;
            border-radius: 12px;
            border: 2px solid #e0dcd3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .square {
            width: 35px;
            height: 35px;
            background-color: #faf9f5;
            border: 1px solid #ece8e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
            transition: background 0.4s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .square.finish {
            border: 2px solid #f39c12;
            color: #f39c12;
            background-color: #fef9e7;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        #timer {
            font-size: 40px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 5px;
        }

        #btn-reset {
            background-color: #fff;
            color: #555;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- האזור האישי --- */
        #personal-area {
            padding: 20px 10px 40px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .card {
            background-color: white;
            color: #333;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            margin-top: 10px;
            border: 1px solid #f0f0f0;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(15px) !important;
        }

        #card-role-title {
            font-size: 18px; 
            font-weight: bold; 
            color: #444; 
            margin-bottom: 15px;
            background-color: #f8f9f9;
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        .main-word-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            border-bottom: 2px dashed #eee;
            padding-bottom: 10px;
        }

        .main-word {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
        }

        .card-icon {
            font-size: 40px;
        }

        .taboo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
        }

        .taboo-list li { margin: 8px 0; }

        .controls {
            display: flex;
            width: 95%;
            max-width: 400px;
            gap: 15px;
        }

        button.action-btn {
            flex: 1;
            padding: 18px 10px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #333;
            transition: transform 0.1s;
        }

        button.action-btn:active { transform: scale(0.95); }
        .btn-correct { background-color: #A9DFBF; box-shadow: 0 4px 0 #7DCEA0;}
        .btn-skip { background-color: #F5B7B1; box-shadow: 0 4px 0 #F1948A;}
        
        .btn-start { 
            background-color: #F9E79F; 
            color: #7D6608; 
            width: 90%; 
            max-width: 350px; 
            margin-top: 20px; 
            box-shadow: 0 4px 0 #F4D03F; 
            border:none; 
            padding: 18px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer;
        }

        .hidden { display: none !important; }

        .message-box {
            background-color: #e8f8f5;
            color: #117a65;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
            border: 1px solid #d1f2eb;
        }

        .players-count {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        @media (max-width: 400px) {
            .square { width: 28px; height: 28px; font-size: 10px; border-radius: 6px; }
            .game-title { font-size: 22px; }
            .main-word { font-size: 26px; }
            .card-icon { font-size: 30px; }
            .taboo-list { font-size: 18px; }
            button.action-btn { font-size: 18px; padding: 15px 5px; }
            #card-role-title { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 class="game-title" style="font-size: 42px; margin-bottom: 10px; text-align: center;">TALIO-BOARD</h1>
        <h3 style="margin-bottom: 20px; color: #777;">הכנס שם חדר ובחר קבוצה:</h3>
        <input type="text" id="room-input" class="room-input" placeholder="שם החדר (למשל: משפחת כהן)">
        
        <div id="team-buttons">
            <button class="team-btn blue" onclick="joinGame('blue')">קבוצה תכלת</button>
            <button class="team-btn red" onclick="joinGame('red')">קבוצה ורודה</button>
        </div>
        
        <button id="btn-add-team" onclick="addExtraTeam()">+ הוסף קבוצה</button>
    </div>

    <div id="shared-board">
        <div class="top-info">
            <button id="btn-reset" onclick="resetGame()">משחק חדש</button>
            <div class="game-title">TALIO</div>
            <div style="font-size: 14px; color: #888; font-weight: bold;" id="room-display"></div>
        </div>
        
        <div id="players-count" class="players-count"></div>

        <div class="board-grid" id="board-grid"></div>

        <div id="timer">01:00</div>
        <div id="status" style="margin-top:5px; color:#888; font-weight:bold; transition: font-size 0.3s;">ממתין לשחקנים...</div>
    </div>

    <div id="personal-area">
        <button id="btn-start" class="btn-start hidden">התחל תור</button>

        <div id="role-message" class="message-box hidden"></div>

        <div id="card-container" class="card hidden">
            <div id="card-role-title"></div>
            
            <div class="main-word-container">
                <span id="card-icon" class="card-icon">🖼️</span>
                <span class="main-word" id="main-word">מילה</span>
            </div>
            
            <ul class="taboo-list" id="taboo-words"></ul>
        </div>

        <div id="controls" class="controls hidden">
            <button id="btn-skip" class="action-btn btn-skip">פס / דילוג</button>
            <button id="btn-correct" class="action-btn btn-correct">הצליחו!</button>
        </div>
    </div>

        function shuffleDeck(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        class GameTurnManager {
            constructor(roomRef, playerId, myTeamId) {
                this.roomRef = roomRef;
                this.playerId = playerId;
                this.myTeamId = myTeamId;
                this.currentState = null;

                this.events = {
                    onTurnStart: (team) => {},
                    onTurnEnd: (team) => {},
                    onTeamChange: (prevTeam, newTeam) => {},
                    onStateUpdate: (state) => {}
                };
            }

            async initializeGame() {
                let fullDeck = Array.from({length: cards.length}, (_, i) => i);
                fullDeck = shuffleDeck(fullDeck);

                const initialState = {
                    teams: [
                        { id: 'blue', name: 'תכלת', players: {}, score: 0 },
                        { id: 'red', name: 'ורוד', players: {}, score: 0 },
                        { id: 'purple', name: 'סגול', players: {}, score: 0 },
                        { id: 'green', name: 'ירוק', players: {}, score: 0 },
                        { id: 'yellow', name: 'צהוב', players: {}, score: 0 }
                    ],
                    currentTeamIndex: 0, 
                    turnStatus: 'transitioning', 
                    turnStartTime: null,
                    turnDuration: 60,
                    deck: fullDeck,
                    currentCardIndex: fullDeck[0],
                    describerId: null,
                    lastDescriberId: null
                };
                await set(this.roomRef, initialState);
            }

            async joinTeam() {
                const snapshot = await get(this.roomRef);
                let state = snapshot.val();
                let totalActivePlayers = 0;

                // בודקים כמה שחקנים רשומים כרגע בחדר
                if (state && state.teams) {
                    state.teams.forEach(t => {
                        if (t.players) totalActivePlayers += Object.keys(t.players).length;
                    });
                }

                // אם החדר לא קיים או שכל השחקנים התנתקו (0 שחקנים) - נאפס את החדר!
                if (!snapshot.exists() || totalActivePlayers === 0) {
                    await this.initializeGame();
                    state = (await get(this.roomRef)).val();
                }
                
                const teamIndex = state.teams.findIndex(t => t.id === this.myTeamId);
                
                if (teamIndex !== -1) {
                    const playerRef = ref(db, `rooms/${this.roomRef.key}/teams/${teamIndex}/players/${this.playerId}`);
                    
                    // הוראה לשרת: תמחק את השחקן הזה כשהחיבור שלו נופל (דפדפן נסגר וכו')
                    await onDisconnect(playerRef).remove();
                    
                    // רושמים את השחקן
                    await set(playerRef, true);
                }
            }

            listenToState() {
                onValue(this.roomRef, (snapshot) => {
                    const newState = snapshot.val();
                    
                    if (!newState) {
                        if (this.currentState) {
                            window.location.reload(); 
                        }
                        return;
                    }

                    const prevState = this.currentState;
                    this.currentState = newState;

                    newState.teams.forEach(team => {
                        team.playerCount = team.players ? Object.keys(team.players).length : 0;
                    });

                    const activeTeams = newState.teams.filter(t => t.playerCount > 0);
                    if (newState.turnStatus === 'transitioning' && activeTeams.length > 0 && newState.teams[newState.currentTeamIndex].playerCount === 0) {
                        let nextIdx = newState.currentTeamIndex;
                        for(let i=1; i<newState.teams.length; i++) {
                            let testIdx = (newState.currentTeamIndex + i) % newState.teams.length;
                            if (newState.teams[testIdx].playerCount > 0) {
                                nextIdx = testIdx; break;
                            }
                        }
                        if (nextIdx !== newState.currentTeamIndex) {
                            update(this.roomRef, { currentTeamIndex: nextIdx });
                            return; 
                        }
                    }

                    if (prevState) {
                        const prevTeam = prevState.teams[prevState.currentTeamIndex];
                        const currentTeam = newState.teams[newState.currentTeamIndex];

                        if (prevState.turnStatus === 'active' && newState.turnStatus === 'ended') {
                            this.events.onTurnEnd(prevTeam);
                        }
                        if (prevState.currentTeamIndex !== newState.currentTeamIndex) {
                            this.events.onTeamChange(prevTeam, currentTeam);
                        }
                        if (prevState.turnStatus !== 'active' && newState.turnStatus === 'active') {
                            this.events.onTurnStart(currentTeam);
                        }
                    }
                    this.events.onStateUpdate(this.currentState);
                });
            }

            async startTurn() {
                if (!this.currentState) return;
                await update(this.roomRef, {
                    turnStatus: 'active',
                    turnStartTime: Date.now(),
                    describerId: this.playerId
                });
            }

            async endTurn() {
                const state = this.currentState;
                if (!state || state.turnStatus !== 'active') return;

                let nextTeamIndex = state.currentTeamIndex;
                for(let i=1; i<=state.teams.length; i++) {
                    let testIndex = (state.currentTeamIndex + i) % state.teams.length;
                    if(state.teams[testIndex].players && Object.keys(state.teams[testIndex].players).length > 0) {
                        nextTeamIndex = testIndex;
                        break;
                    }
                }

                await update(this.roomRef, { 
                    turnStatus: 'ended',
                    lastDescriberId: state.describerId 
                });

                setTimeout(async () => {
                    await update(this.roomRef, {
                        currentTeamIndex: nextTeamIndex,
                        turnStatus: 'transitioning',
                        turnStartTime: null,
                        describerId: null
                    });
                }, 3000); 
            }

            async drawCard(isCorrect) {
                const state = this.currentState;
                const activeTeam = state.teams[state.currentTeamIndex];

                if (state.turnStatus !== 'active' || state.describerId !== this.playerId) return;

                let deck = state.deck || [];
                deck.shift(); 
                
                if (deck.length === 0) {
                    deck = Array.from({length: cards.length}, (_, i) => i);
                    deck = shuffleDeck(deck);
                }

                let updates = {
                    deck: deck,
                    currentCardIndex: deck[0] 
                };

                if (isCorrect) {
                    updates[`teams/${state.currentTeamIndex}/score`] = activeTeam.score + 1;
                }

                await update(this.roomRef, updates);
            }
        }

        function updateBoardColors(teams) {
            for(let i=0; i<=MAX_STEPS; i++) {
                let sq = document.getElementById('sq-' + i);
                if(sq) sq.style.background = ''; 
            }

            let squaresMap = {};
            teams.forEach(team => {
                if(team.score > 0 || team.playerCount > 0) {
                    let pos = Math.min(team.score, MAX_STEPS);
                    if(!squaresMap[pos]) squaresMap[pos] = [];
                    squaresMap[pos].push(teamBgColors[team.id]);
                }
            });

            for(let pos in squaresMap) {
                let sq = document.getElementById('sq-' + pos);
                if(sq) {
                    let colors = squaresMap[pos];
                    if(colors.length === 1) {
                        sq.style.background = colors[0];
                    } else {
                        let gradient = 'linear-gradient(to right, ';
                        let step = 100 / colors.length;
                        colors.forEach((c, i) => {
                            gradient += `${c} ${i*step}%, ${c} ${(i+1)*step}%`;
                            if(i < colors.length - 1) gradient += ', ';
                        });
                        gradient += ')';
                        sq.style.background = gradient;
                    }
                }
            }
        }

        function setupTurnManagerEvents() {
            turnManager.events.onStateUpdate = (state) => {
                
                updateBoardColors(state.teams);

                const activeTeamsCount = state.teams.filter(t => t.playerCount > 0).length;
                const isSingleTeamMode = activeTeamsCount === 1;

                let playersText = [];
                state.teams.forEach(t => {
                    if (t.playerCount > 0) playersText.push(`${t.name}: ${t.playerCount}`);
                });
                uiPlayersCount.textContent = `שחקנים מחוברים - ${playersText.join(' | ')}`;

                let winnerTeam = null;
                state.teams.forEach(t => { if(t.score >= MAX_STEPS) winnerTeam = t; });

                if (winnerTeam) {
                    uiCardContainer.classList.add('hidden');
                    document.getElementById('controls').classList.add('hidden');
                    uiRoleMessage.classList.add('hidden');
                    uiBtnStart.classList.add('hidden');

                    if (localTimerInterval) {
                        clearInterval(localTimerInterval);
                        localTimerInterval = null;
                    }
                    
                    uiStatus.textContent = `🏆 קבוצת ${winnerTeam.name} ניצחה! 🏆`;
                    uiStatus.style.fontSize = "26px";
                    uiStatus.style.color = teamColors[winnerTeam.id];
                    
                    return; // אין כפתור יציאה – השחקנים יוכלו לצאת (לרענן/לסגור) ואז החדר יתאפס לבד לפעם הבאה.
                }

                const currentTeam = state.teams[state.currentTeamIndex];

                if (state.turnStatus === 'active') {
                    if (!localTimerInterval) {
                        localTimerInterval = setInterval(() => {
                            if (!turnManager.currentState || turnManager.currentState.turnStatus !== 'active') {
                                clearInterval(localTimerInterval);
                                localTimerInterval = null;
                                return;
                            }
                            
                            let elapsed = Math.floor((Date.now() - turnManager.currentState.turnStartTime) / 1000);
                            let timeLeft = turnManager.currentState.turnDuration - elapsed;
                            
                            if (timeLeft <= 0) {
                                timeLeft = 0;
                                if (turnManager.currentState.describerId === myPlayerId) {
                                    turnManager.endTurn();
                                }
                            }
                            
                            uiTimer.textContent = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                        }, 250); 
                    }
                } else {
                    if (localTimerInterval) {
                        clearInterval(localTimerInterval);
                        localTimerInterval = null;
                    }
                    uiTimer.textContent = `00:${state.turnDuration}`;
                }

                            uiRoleMessage.classList.add('hidden');

                            document.getElementById('controls').classList.remove('hidden');

                            }
                        } else {
                            uiBtnStart.classList.add('hidden');
                        }
                        
                        if (uiBtnStart.classList.contains('hidden') === false || turnManager.myTeamId !== currentTeam.id) {
                            uiStatus.textContent = `📢 עכשיו התור של קבוצת ${currentTeam.name}!`;
                        }
                        uiStatus.style.fontSize = "20px";
                        uiStatus.style.color = teamColors[currentTeam.id] || '#333';
                    }
                }
            };
        }

        uiBtnStart.addEventListener('click', () => {
            if (turnManager) turnManager.startTurn();
        });

        document.getElementById('btn-correct').addEventListener('click', () => {
            if (turnManager) turnManager.drawCard(true);
        });

        document.getElementById('btn-skip').addEventListener('click', () => {
            if (turnManager) turnManager.drawCard(false);
        });

        let fadeTimeout;
        function loadCardIfNeeded(index) {
            if (index === lastDisplayedCardIndex) return;
            lastDisplayedCardIndex = index;

            const card = cards[index];
            if (!card) return;

            uiCardContainer.classList.add('fade-out');
            clearTimeout(fadeTimeout);
            
            fadeTimeout = setTimeout(() => {
                document.getElementById('main-word').textContent = card.word;
                document.getElementById('card-icon').textContent = card.icon || "🖼️";

                const uiTabooWords = document.getElementById('taboo-words');
                uiTabooWords.innerHTML = '';
                card.taboo.forEach(word => {
                    const li = document.createElement('li');
                    li.textContent = word;
                    uiTabooWords.appendChild(li);
                });
                uiCardContainer.classList.remove('fade-out');
            }, 300);
        }
    </script>
</body>
</html>
